name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6.0" "nbqa>=1.8.0"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: nbqa ruff (notebooks)
        run: nbqa ruff --extend-ignore=E402,F401,E702,E401,I001,F811,F541 breast_cancer.ipynb fraud.ipynb

  import-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: python scripts/smoke_test.py
