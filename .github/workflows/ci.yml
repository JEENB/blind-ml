name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.6.0" "nbqa>=1.8.0"

      - name: ruff check
        run: ruff check .

      - name: ruff format check
        run: ruff format --check .

      - name: nbqa ruff (notebooks)
        run: nbqa ruff breast_cancer.ipynb fraud.ipynb

  import-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Import smoke test
        run: |
          python -c "from blind_ml import NaiveBayesModel, DecisionTreeModel, LogisticRegressionModel; print('blind_ml OK')"
          python -c "from blind_ml.client import BlindInsightClient; print('client OK')"
          python -c "from blind_ml.demo_helpers import data_table; print('demo_helpers OK')"
          python -c "from blind_ml.healthcare import run_bc_full_validation; print('healthcare OK')"
